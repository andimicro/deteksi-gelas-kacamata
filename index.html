<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Deteksi Gelas dan Kacamata</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        #webcam-container { margin-top: 20px; }
        #label-container { margin-top: 20px; font-size: 24px; font-weight: bold; color: #007bff; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; border-radius: 10px; border: none; background-color: #28a745; color: white; }
    </style>
</head>
<body>
    <h1>AI Deteksi Objek</h1>
    <button type="button" onclick="init()">Mulai Kamera</button>
    <div id="webcam-container"></div>
    <div id="label-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8/dist/teachablemachine-image.min.js"></script>
    <script type="text/javascript">
        // Link model Anda yang tadi disalin
        const URL = "https://teachablemachine.withgoogle.com/models/B_Nskjgzu/";

        let model, webcam, labelContainer, maxPredictions;

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            const flip = true; 
            webcam = new tmImage.Webcam(300, 300, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let highestProb = 0;
            let bestLabel = "";
            
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestLabel = prediction[i].className;
                }
            }
            labelContainer.innerHTML = bestLabel + ": " + (highestProb * 100).toFixed(0) + "%";
        }
    </script>
</body>
</html>
